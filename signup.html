<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign up page</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/sweetalert/dist/sweetalert.min.js"></script>
    <style>
 .content-wrapper {
    display: flex;
    justify-content: center;
    align-items: flex-start;
    gap: 40px;
    padding: 40px 5%;
    flex-wrap: wrap;
}

.container {
    width: 100%;
    max-width: 500px;
    padding: 30px;
    background-color: #ffffff;
    border-radius: 12px;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
    box-sizing: border-box;
}

.container h2 {
    margin-top: 0;
    color: #333;
    font-size: clamp(24px, 5vw, 40px);
}


form label {
    display: block;
    margin-top: 15px;
    font-weight: bold;
    color: #555;
}

form input[type="text"],
form input[type="password"],
form textarea {
    width: 100%;
    padding: 12px;
    margin-top: 5px;
    border: 1px solid #ddd;
    border-radius: 6px;
    box-sizing: border-box;
    font-size: 16px;
}

form input[type="submit"] {
    background-color: #00a55b;
    color: white;
    padding: 14px 20px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    width: 100%;
    font-size: 16px;
    margin-top: 20px;
    transition: background-color 0.3s;
}

form input[type="submit"]:hover {
    background-color: #008f4c;
}

.radio-group {
    margin-top: 15px;
}


    </style>
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="nav-logo">
            <img src="images/SpotOn logo.png" alt="SpotOn logo">
            <h1>SpotOn</h1>
        </a>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="financials.html">Financials</a></li>
            <li><a href="marketing.html">Marketing</a></li>
            <li><a href="team.html">Meet the team</a></li>
        </ul>
    </nav>
        <div class="content-wrapper">
            <div class="container">
            <h2>Get early access to SpotOn</h2>
            <p>Be the first to plan hangouts that fit your budget, diet and vibe.</p>
            <form name="signup-form"> <!-- https://www.w3schools.com/tags/tag_form.asp -->
                <label for="fullname">Full name:</label>
                <input type="text" id="fullname" name="fullname" required>
                
                <label for="email">Email address:</label>
                <input type="text" id="email" name="email" required>

                <label for="username">Username:</label>
                <input type="text" id="username" name="username" required>

                <label for="password">Password:</label>
                <input type="password" id="password" name="password" required>

                <label for="confirm-password">Confirm Password:</label>
                <input type="password" id="confirm-password" name="confirm-password" required>
                
                <div class="radio-group">
                    <p><strong>I am a:</strong></p>
                    <input type="radio" id="user" name="customer" value="user" checked>
                    <label for="user" style="display:inline; margin:0;">User</label>
                    
                    <input type="radio" id="business" name="customer" value="business" style="margin-left: 20px;">
                    <label for="business" style="display:inline; margin:0;">Business</label>
                </div>
                
                <input type="submit" value="Join beta">
            </form> 
        </div>
        <script>
            const scriptURL = "https://script.google.com/a/macros/mail.dcu.ie/s/AKfycbxEdLKcu6EVYSpI5wrzvvYQZT1CR4geVt_E0_0UaaLjYsYblMOa9aJSK6nulTvAsnAmyg/exec";
            const form = document.forms['signup-form'];

            form.addEventListener('submit', e => {
                e.preventDefault();
                
                const pass = form.elements['password'].value;
                const confirmPass = form.elements['confirm-password'].value;
                if (pass !== confirmPass) {
                    swal("Error!", "Passwords do not match.", "error");
                    return;
                }

                fetch(scriptURL, { method: 'POST', body: new FormData(form)})
                    .then(response => {
                        swal("Success!", "You have been registered for the beta.", "success");
                        form.reset();
                    })
                    .catch(error => {
                        swal("Error!", "Something went wrong. Please try again.", "error");
                        console.error('Error!', error.message);
                    });
            });
        </script>
        </div>
    <div class="footer">
        <footer>
            Copyright © 2026 SpotOn website | <a href="contact.html">Contact us</a>
        </footer>
    </div>
</body>
</html>
